<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedlikehold kreditorliste</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card">
    <header class="brand-header">
      <img class="brand-logo" src="assets/logos/kraftbank-logo.svg" alt="Kraft Bank logo">
      <img class="brand-icon" src="assets/logos/kraftbank-logopain.svg" alt="Kraft Bank logopain">
    </header>

    <h1>Vedlikehold kreditorliste</h1>
    <p>Rediger kreditorer og eventuelle forhåndsdefinerte kontonummer.</p>

    <div class="actions actions-left">
      <a class="manage-link" href="index.html">Tilbake til betaling</a>
      <a class="manage-link" href="history.html">Historikk og backup</a>
      <button type="button" id="add-creditor">Legg til kreditor</button>
      <button type="button" id="save-creditors">Lagre liste</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Kreditor</th>
            <th>Kontonummer (11 sifre)</th>
            <th>Handling</th>
          </tr>
        </thead>
        <tbody id="creditors-body"></tbody>
      </table>
    </div>

    <p id="creditors-status"></p>
  </main>

  <script src="creditors.js"></script>
</body>
</html>
