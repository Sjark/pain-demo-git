<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historikk og backup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card">
    <header class="brand-header">
      <img class="brand-logo" src="assets/logos/kraftbank-logo.svg" alt="Kraft Bank logo">
      <img class="brand-icon" src="assets/logos/kraftbank-logopain.svg" alt="Kraft Bank logopain">
    </header>

    <h1>Historikk og backup</h1>
    <p>Viser genererte filer med saksbehandler og CLO nummer.</p>

    <div class="actions actions-left">
      <a class="manage-link" href="index.html">Tilbake til betaling</a>
      <a class="manage-link" href="creditors.html">Vedlikehold kreditorliste</a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Opprettet</th>
            <th>Saksbehandler</th>
            <th>CLO nummer</th>
            <th>Antall linjer</th>
            <th>Fil</th>
            <th>Backup</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>

    <p id="history-status"></p>
  </main>

  <script src="history.js"></script>
</body>
</html>
