name: Deploy Backend (App Service)

on:
  push:
    branches: [ "main" ]
    paths:
      - "Betaling SR-bank/server.js"
      - "Betaling SR-bank/package.json"
      - "Betaling SR-bank/package-lock.json"
      - ".github/workflows/appservice.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: "Betaling SR-bank"

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: "pain-demo-sr"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: "Betaling SR-bank"

